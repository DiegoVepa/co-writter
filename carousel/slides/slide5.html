<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  padding: 0 45pt;
}
h2 {
  color: #FFFFFF; font-size: 22pt; text-align: left;
  margin: 0 0 35pt 0; line-height: 1.4;
}
.item {
  display: flex; flex-direction: row; align-items: center;
  margin: 0 0 26pt 0;
}
.num {
  width: 42pt; height: 42pt; min-width: 42pt;
  background: #E67E22; border-radius: 21pt;
  display: flex; align-items: center; justify-content: center;
  margin: 0 18pt 0 0;
}
.num p {
  color: #FFFFFF; font-size: 18pt; margin: 0; text-align: center;
}
.text p {
  color: #FFFFFF; font-size: 18pt; margin: 0; line-height: 1.4;
}
</style>
</head>
<body>
<div class="wrap">
  <h2>What high-velocity orgs<br>do differently:</h2>
  <div class="item">
    <div class="num"><p>1</p></div>
    <div class="text"><p>Clear ownership</p></div>
  </div>
  <div class="item">
    <div class="num"><p>2</p></div>
    <div class="text"><p>Defined decision rights</p></div>
  </div>
  <div class="item">
    <div class="num"><p>3</p></div>
    <div class="text"><p>Real-time KPI visibility</p></div>
  </div>
  <div class="item">
    <div class="num"><p>4</p></div>
    <div class="text"><p>Accountability without<br>bottlenecks</p></div>
  </div>
</div>
</body>
</html>
