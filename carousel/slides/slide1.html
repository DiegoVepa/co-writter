<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 440pt;
}
h1 {
  color: #E67E22; font-size: 30pt; text-align: center;
  margin: 0 0 30pt 0; line-height: 1.3;
}
.divider {
  width: 60pt; height: 3pt; background: #E67E22; border-radius: 2pt;
  margin: 0 auto 30pt auto;
}
p {
  color: #999999; font-size: 15pt; text-align: center;
  margin: 0; line-height: 1.6;
}
p span { color: #FFFFFF; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Revenue growth follows<br>operational velocity.</h1>
  <div class="divider"></div>
  <p>The real bottleneck in SMB growth isn't capital.<br><span>It's decision speed.</span></p>
</div>
</body>
</html>
