<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420pt;
}
h1 {
  color: #FFFFFF; font-size: 28pt; text-align: center;
  margin: 0 0 40pt 0; line-height: 1.4;
}
.accent-line {
  width: 80pt; height: 2pt; background: #E67E22;
  margin: 0 auto 40pt auto;
}
p {
  color: #E67E22; font-size: 22pt; text-align: center;
  margin: 0; line-height: 1.5;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Growth doesn't stall<br>because of strategy.</h1>
  <div class="accent-line"></div>
  <p>It stalls because decisions<br>move too slowly.</p>
</div>
</body>
</html>
