<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420pt;
}
.box {
  padding: 30pt; border: 2pt solid #E67E22; border-radius: 8pt;
  margin: 0 0 40pt 0;
}
.box p {
  color: #FFFFFF; font-size: 20pt; text-align: center;
  margin: 0; line-height: 1.5;
}
.box p span {
  color: #E67E22;
}
p.cta {
  color: #999999; font-size: 14pt; text-align: center;
  margin: 0; line-height: 1.6;
}
p.cta span {
  color: #E67E22;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <p>Map the last 5 decisions<br>that took more than a week.<br><span>You'll find your growth ceiling.</span></p>
  </div>
  <p class="cta"><span>Follow for more</span> on operational<br>strategy and SMB growth.</p>
</div>
</body>
</html>
