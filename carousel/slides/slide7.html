<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420pt;
}
p.q1 {
  color: #999999; font-size: 18pt; text-align: center;
  margin: 0 0 30pt 0; line-height: 1.5;
}
.divider {
  width: 40pt; height: 2pt; background: #E67E22;
  margin: 0 auto 30pt auto;
}
p.q2 {
  color: #E67E22; font-size: 24pt; text-align: center;
  margin: 0; line-height: 1.5;
}
</style>
</head>
<body>
<div class="wrap">
  <p class="q1">If growth has plateaued,<br>the question isn't<br>"What's our strategy?"</p>
  <div class="divider"></div>
  <p class="q2">It's "How long does it<br>take us to decide?"</p>
</div>
</body>
</html>
