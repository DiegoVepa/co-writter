<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  padding: 0 50pt;
}
.line1 p {
  color: #FFFFFF; font-size: 26pt; margin: 0 0 8pt 0; line-height: 1.3;
}
.bar1 {
  width: 260pt; height: 3pt; background: #555555;
  margin: 16pt 0;
}
.line2 p {
  color: #E67E22; font-size: 32pt; margin: 0 0 8pt 0; line-height: 1.3;
}
.bar2 {
  width: 340pt; height: 3pt; background: #555555;
  margin: 16pt 0;
}
.line3 p {
  color: #FFFFFF; font-size: 38pt; margin: 0; line-height: 1.3;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="line1"><p>Slow decisions create hidden friction.</p></div>
  <div class="bar1"></div>
  <div class="line2"><p>Friction kills momentum.</p></div>
  <div class="bar2"></div>
  <div class="line3"><p>Momentum drives scale.</p></div>
</div>
</body>
</html>
