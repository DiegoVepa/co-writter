<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 540pt; height: 540pt;
  background: #2D2D2D; font-family: Arial, sans-serif;
  position: relative; overflow: hidden;
}
.wrap {
  position: absolute; top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  padding: 0 45pt;
}
h2 {
  color: #E67E22; font-size: 22pt; text-align: left;
  margin: 0 0 28pt 0;
}
.item {
  margin: 0 0 14pt 0; padding: 16pt 20pt;
  background: #3A3A3A; border-left: 4pt solid #E67E22;
}
.item p {
  color: #FFFFFF; font-size: 14pt; margin: 0; line-height: 1.4;
}
.item p span {
  color: #999999;
}
p.footer {
  color: #FFFFFF; font-size: 18pt; margin: 22pt 0 0 0; text-align: center;
}
</style>
</head>
<body>
<div class="wrap">
  <h2>Where decisions get stuck:</h2>
  <div class="item"><p>Pricing adjustments <span>— sit for weeks</span></p></div>
  <div class="item"><p>Hiring approvals <span>— delayed indefinitely</span></p></div>
  <div class="item"><p>Marketing tests <span>— wait for consensus</span></p></div>
  <div class="item"><p>Sales exceptions <span>— require founder sign-off</span></p></div>
  <p class="footer">Every delay compounds.</p>
</div>
</body>
</html>
